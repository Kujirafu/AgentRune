<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="rune" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="220" r="140" fill="url(#glow)"/>
  <!-- Rune symbol — stylized "R" with Nordic rune feel -->
  <g transform="translate(256,256)" fill="none" stroke="url(#rune)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical staff -->
    <line x1="0" y1="-120" x2="0" y2="120"/>
    <!-- Upper branch (right) -->
    <line x1="0" y1="-120" x2="70" y2="-50"/>
    <!-- Middle connection -->
    <line x1="70" y1="-50" x2="0" y2="10"/>
    <!-- Lower branch (right, kick) -->
    <line x1="0" y1="10" x2="80" y2="120"/>
    <!-- Small accent marks (rune dots) -->
    <circle cx="-30" cy="-80" r="6" fill="#60a5fa" stroke="none" opacity="0.6"/>
    <circle cx="-30" cy="80" r="6" fill="#818cf8" stroke="none" opacity="0.6"/>
  </g>
  <!-- Subtle border ring -->
  <rect x="8" y="8" width="496" height="496" rx="100" fill="none" stroke="rgba(96,165,250,0.15)" stroke-width="2"/>
</svg>
