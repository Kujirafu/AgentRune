<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>AgentRune</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; overscroll-behavior: none; position: fixed; width: 100%; height: 100%; }

    :root {
      --bg-gradient: linear-gradient(135deg, #d2e2da 0%, #e8ddd4 45%, #e6cfc9 100%);
      --text-primary: #1e293b;
      --text-secondary: #52667a;
      --glass-bg: rgba(255, 255, 255, 0.45);
      --glass-bg-hover: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 255, 255, 0.65);
      --glass-shadow: 0 4px 24px rgba(52, 119, 146, 0.06);
      --accent-primary: #37ACC0;
      --accent-primary-bg: rgba(55, 172, 192, 0.1);
      --card-bg: rgba(255, 255, 255, 0.42);
      --icon-bg: rgba(255, 255, 255, 0.5);
      --sheet-bg: linear-gradient(180deg, rgba(189,209,198,0.93) 0%, rgba(245,218,197,0.96) 100%);
      --sheet-glow-1: rgba(55,172,192,0.1);
      --sheet-glow-2: rgba(208,152,153,0.08);
    }

    html.dark {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #0d1222 50%, #1e1b4b 100%);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(30, 41, 59, 0.3);
      --glass-bg-hover: rgba(51, 65, 85, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --accent-primary: #38bdf8;
      --accent-primary-bg: rgba(30, 41, 59, 0.8);
      --card-bg: rgba(15, 23, 42, 0.3);
      --icon-bg: rgba(255, 255, 255, 0.03);
      --sheet-bg: linear-gradient(180deg, rgba(30,41,59,0.88) 0%, rgba(15,23,42,0.95) 100%);
      --sheet-glow-1: rgba(59,130,246,0.12);
      --sheet-glow-2: rgba(139,92,246,0.08);
    }

    html, body, #root {
      height: 100dvh;
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes springSlideUp {
      0% { opacity: 0; transform: translateY(32px); }
      60% { opacity: 1; transform: translateY(-4px); }
      80% { transform: translateY(1.5px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.15); }
    }
    @keyframes statusGlow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(2.5); }
    }
    @keyframes statusRing {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(3); }
    }
    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.97); }
    }
    @keyframes borderGlowBlue {
      0%, 100% { box-shadow: inset 0 0 20px 2px rgba(96,165,250,0.15), inset 0 0 5px 1px rgba(96,165,250,0.25); }
      50% { box-shadow: inset 0 0 35px 5px rgba(96,165,250,0.3), inset 0 0 10px 2px rgba(96,165,250,0.45); }
    }
    @keyframes borderGlowBlueLight {
      0%, 100% { box-shadow: inset 0 0 14px 3px rgba(255,127,80,0.4), inset 0 0 5px 2px rgba(255,127,80,0.5); }
      50% { box-shadow: inset 0 0 22px 5px rgba(255,127,80,0.55), inset 0 0 9px 3px rgba(255,127,80,0.7); }
    }
    @keyframes borderGlowTeal {
      0%, 100% { box-shadow: inset 0 0 20px 2px rgba(55,172,192,0.15), inset 0 0 5px 1px rgba(55,172,192,0.25); }
      50% { box-shadow: inset 0 0 35px 5px rgba(55,172,192,0.3), inset 0 0 10px 2px rgba(55,172,192,0.45); }
    }
    @keyframes borderGlowTealLight {
      0%, 100% { box-shadow: inset 0 0 14px 3px rgba(55,172,192,0.25), inset 0 0 5px 2px rgba(55,172,192,0.35); }
      50% { box-shadow: inset 0 0 22px 5px rgba(55,172,192,0.4), inset 0 0 9px 3px rgba(55,172,192,0.55); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function() {
      function pin() {
        if (window.scrollY) window.scrollTo(0, 0);
        if (document.documentElement.scrollTop) document.documentElement.scrollTop = 0;
      }
      window.addEventListener('scroll', pin, { passive: true });
      document.addEventListener('scroll', pin, true);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
