<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AgentRune</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      /* Bright Mode (Default) Variables */
      /* Based exactly on the provided mockup */
      --bg-gradient: linear-gradient(135deg, #dcfce7 0%, #e0f2fe 50%, #d8b4fe 100%);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --glass-bg: rgba(255, 255, 255, 0.4);
      --glass-bg-hover: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
      --accent-primary: #3b82f6;
      --accent-primary-bg: rgba(255, 255, 255, 0.8);
      --card-bg: rgba(255, 255, 255, 0.4);
      --icon-bg: rgba(255, 255, 255, 0.5);
    }

    /* Target the .dark class for manual toggling */
    html.dark {
      /* Dark Mode (Midnight Glass) Variables */
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #0d1222 50%, #1e1b4b 100%);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(30, 41, 59, 0.3);
      --glass-bg-hover: rgba(51, 65, 85, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --accent-primary: #38bdf8;
      --accent-primary-bg: rgba(30, 41, 59, 0.8);
      --card-bg: rgba(15, 23, 42, 0.3);
      --icon-bg: rgba(255, 255, 255, 0.03);
    }

    html, body, #root {
      height: 100dvh;
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.97); }
    }
    @keyframes borderGlow {
      0%, 100% { box-shadow: inset 0 0 18px 1px rgba(255, 255, 255, 0.08), inset 0 0 4px 0px rgba(255, 255, 255, 0.15); }
      50% { box-shadow: inset 0 0 30px 3px rgba(255, 255, 255, 0.18), inset 0 0 8px 1px rgba(255, 255, 255, 0.3); }
    }
    html.dark .border-glow-active {
      box-shadow: inset 0 0 18px 1px rgba(255, 255, 255, 0.08), inset 0 0 4px 0px rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Safety net: pin JS-level scroll at (0,0)
    // The main scroll lock is in native Java (MainActivity.java)
    (function() {
      function pin() {
        if (window.scrollY) window.scrollTo(0, 0);
        if (document.documentElement.scrollTop) document.documentElement.scrollTop = 0;
      }
      window.addEventListener('scroll', pin, { passive: true });
      document.addEventListener('scroll', pin, true);
    })();
  </script>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
